<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT Prompt Manager Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard__header">
        <h1>GPT Prompt Manager Dashboard</h1>
        <p id="save-status" class="save-status" aria-live="polite"></p>
      </header>

      <section class="workspace">
        <div class="panel-grid panel-grid--compact">
          <section class="card">
            <h2>Library Controls</h2>
            <div class="form-grid">
              <label for="editor-mode">Mode</label>
              <select id="editor-mode">
                <option value="prompts">Prompts</option>
                <option value="checkpoints">Checkpoints</option>
              </select>

              <label for="category-select">Category</label>
              <select id="category-select"></select>

              <div class="inline-form">
                <input id="category-name" type="text" placeholder="Category name" />
                <button id="category-add" type="button">Add</button>
              </div>

              <div class="actions actions--wrap">
                <button id="category-rename" type="button">Rename</button>
                <button id="category-position" type="button">Set Position</button>
                <button id="category-delete" type="button">Delete</button>
              </div>

              <label for="item-select">Saved Items</label>
              <select id="item-select"></select>

              <div class="actions actions--wrap">
                <button id="item-new" type="button">New</button>
                <button id="item-edit" type="button">Edit</button>
                <button id="item-delete" type="button">Delete</button>
              </div>
            </div>
          </section>

          <section class="card">
            <h2 id="editor-title">Prompt Editor</h2>
            <div class="form-grid">
              <label for="item-editor-category">Category</label>
              <select id="item-editor-category"></select>

              <label for="item-editor-title">Title</label>
              <input id="item-editor-title" type="text" placeholder="Title" />

              <label for="item-editor-description">Description</label>
              <input id="item-editor-description" type="text" placeholder="Short description" />

              <label for="item-editor-body">Body</label>
              <textarea id="item-editor-body" rows="12" placeholder="Body"></textarea>

              <label for="item-editor-position">Position</label>
              <input id="item-editor-position" type="number" min="1" step="1" placeholder="1" />

              <label for="item-editor-saved-at">Last Saved</label>
              <input id="item-editor-saved-at" type="text" readonly />
            </div>
            <div class="actions">
              <button id="item-save" type="button">Save Prompt</button>
              <button id="item-cancel" type="button" class="btn-secondary">Cancel</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="dashboard.js" type="module"></script>
  </body>
</html>
